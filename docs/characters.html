  <script>
    const cards = document.querySelectorAll(".character-card");

    function setCardState(card, nextState) {
      const button = card.querySelector(".character-card-button");
      card.classList.toggle("is-flipped", nextState);
      button.setAttribute("aria-pressed", nextState ? "true" : "false");
    }

    cards.forEach((card) => {
      const button = card.querySelector(".character-card-button");

      button.addEventListener("click", () => {
        const nextState = !card.classList.contains("is-flipped");

        cards.forEach((otherCard) => {
          if (otherCard !== card) {
            setCardState(otherCard, false);
          }
        });

        setCardState(card, nextState);
      });
    });

    document.addEventListener("keydown", (event) => {
      if (event.key !== "Escape") {
        return;
      }

      cards.forEach((card) => {
        setCardState(card, false);
      });
    });
  </script>
</body>
</html>

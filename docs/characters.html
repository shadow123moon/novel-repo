  <script>
    const board = document.querySelector(".character-board");
    const cards = Array.from(document.querySelectorAll(".character-card"));
    const threads = Array.from(document.querySelectorAll(".thread-map .thread"));

    function setCardState(card, nextState) {
      const button = card.querySelector(".character-card-button");
      card.classList.toggle("is-flipped", nextState);
      button.setAttribute("aria-pressed", nextState ? "true" : "false");
    }

    function setBoardFocus(activeCard) {
      if (!activeCard) {
        board.classList.remove("is-focused");

        cards.forEach((card) => {
          card.classList.remove("is-selected", "is-related");
        });

        threads.forEach((thread) => {
          thread.classList.remove("is-related");
        });

        return;
      }

      const activeId = activeCard.dataset.card;
      const relatedIds = new Set(
        (activeCard.dataset.links || "")
          .split(/\s+/)
          .filter(Boolean)
      );

      relatedIds.add(activeId);
      board.classList.add("is-focused");

      cards.forEach((card) => {
        const cardId = card.dataset.card;
        card.classList.toggle("is-selected", card === activeCard);
        card.classList.toggle("is-related", card !== activeCard && relatedIds.has(cardId));
      });

      threads.forEach((thread) => {
        thread.classList.toggle("is-related", thread.classList.contains(`link-${activeId}`));
      });
    }

    cards.forEach((card) => {
      const button = card.querySelector(".character-card-button");

      button.addEventListener("click", () => {
        const nextState = !card.classList.contains("is-flipped");

        cards.forEach((otherCard) => {
          if (otherCard !== card) {
            setCardState(otherCard, false);
          }
        });

        setCardState(card, nextState);

        if (nextState) {
          setBoardFocus(card);
          return;
        }

        setBoardFocus(null);
      });
    });

    document.addEventListener("keydown", (event) => {
      if (event.key !== "Escape") {
        return;
      }

      cards.forEach((card) => {
        setCardState(card, false);
      });

      setBoardFocus(null);
    });
  </script>
